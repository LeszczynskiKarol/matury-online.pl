server {
    listen 80;
    server_name matury-online.pl www.matury-online.pl;
    return 301 https://matury-online.pl$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.matury-online.pl;
    ssl_certificate /etc/letsencrypt/live/matury-online.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matury-online.pl/privkey.pem;
    return 301 https://matury-online.pl$request_uri;
}

server {
    listen 443 ssl http2;
    server_name matury-online.pl;

    ssl_certificate /etc/letsencrypt/live/matury-online.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matury-online.pl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Astro frontend (SSR or static)
    root /var/www/matury-online/frontend/dist;

    # API proxy to Fastify backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Stripe webhooks need raw body
        proxy_set_header Content-Type $content_type;
        proxy_pass_request_body on;
    }

    # Astro SSR (if using Astro node adapter)
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OR for static Astro (SSG):
        # try_files $uri $uri/ /index.html;
    }

    # Static assets cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    client_max_body_size 10M;
}
